<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 22px 24px; background: var(--bg-base); }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .lbl { font: var(--text-eyebrow); text-transform: uppercase; letter-spacing: var(--ls-wider); color: var(--text-tertiary); width: 84px; flex: 0 0 84px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Switch } = window.TempoDesignSystem_e112f2;
  const I = (n, sz=16) => <i data-lucide={n} style={{ width: sz, height: sz }}></i>;

  function Demo() {
    return (
      <div>
        <div className="row">
          <span className="lbl">Buttons</span>
          <Button variant="primary" iconLeft={I('upload')}>Upload</Button>
          <Button variant="secondary">Cancel</Button>
          <Button variant="outline">Explore</Button>
          <Button variant="ghost" size="sm">View all</Button>
          <Button variant="danger" size="sm">Delete</Button>
          <Button variant="primary" loading>Saving</Button>
        </div>
        <div className="row">
          <span className="lbl">Icon</span>
          <IconButton label="More" variant="ghost">{I('more-vertical')}</IconButton>
          <IconButton label="Grid" variant="accent" active>{I('layout-grid')}</IconButton>
          <IconButton label="List" variant="solid">{I('list')}</IconButton>
          <IconButton label="Bell" variant="ghost">{I('bell')}</IconButton>
          <IconButton label="Filter" variant="solid">{I('sliders-horizontal')}</IconButton>
        </div>
        <div className="row">
          <span className="lbl">Input</span>
          <div style={{ width: 320 }}>
            <Input iconLeft={I('search')} placeholder="Search notes, flashcards, exams…" />
          </div>
          <Switch defaultChecked label="Verified only" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  setTimeout(() => window.lucide && window.lucide.createIcons(), 30);
</script>
</body>
</html>
