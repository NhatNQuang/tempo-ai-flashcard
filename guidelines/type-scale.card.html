<!-- @dsCard group="Type" viewport="700x200" name="Type scale" subtitle="Display → caption ramp" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 18px 22px; background: var(--bg-base); }
  .line { display: flex; align-items: baseline; gap: 14px; padding: 3px 0; }
  .line .t { color: var(--text-primary); }
  .line .m { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); margin-left: auto; }
  .h1 { font: var(--text-h1); }
  .h2 { font: var(--text-h2); }
  .h3 { font: var(--text-h3); }
  .ti { font: var(--text-title); }
  .bd { font: var(--text-body-md); color: var(--text-secondary) !important; }
  .ca { font: var(--text-caption); color: var(--text-tertiary) !important; }
</style>
</head>
<body>
  <div class="line"><span class="t h1">Analytics</span><span class="m">h1 · Space Grotesk 700 · 30px</span></div>
  <div class="line"><span class="t h2">Study Spaces</span><span class="m">h2 · Jakarta 700 · 24px</span></div>
  <div class="line"><span class="t h3">Review Forecast</span><span class="m">h3 · Jakarta 600 · 20px</span></div>
  <div class="line"><span class="t ti">Deep Learning Squad</span><span class="m">title · 600 · 17px</span></div>
  <div class="line"><span class="t bd">Track your progress and improve your learning journey.</span><span class="m">body · 400 · 14px</span></div>
  <div class="line"><span class="t ca">Edited 2 days ago</span><span class="m">caption · 500 · 12px</span></div>
</body>
</html>
