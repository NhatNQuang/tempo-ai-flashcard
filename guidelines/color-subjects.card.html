<!-- @dsCard group="Colors" viewport="700x150" name="Subject accents" subtitle="Per-discipline study-space colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-base); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .chip { width: 100%; height: 52px; border-radius: var(--radius-md); }
  .name { font: var(--text-caption); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--subject-cs)"></div><span class="name">Comp Sci</span></div>
    <div class="sw"><div class="chip" style="background:var(--subject-math)"></div><span class="name">Mathematics</span></div>
    <div class="sw"><div class="chip" style="background:var(--subject-science)"></div><span class="name">Science</span></div>
    <div class="sw"><div class="chip" style="background:var(--subject-lang)"></div><span class="name">Languages</span></div>
    <div class="sw"><div class="chip" style="background:var(--subject-bio)"></div><span class="name">Biology</span></div>
    <div class="sw"><div class="chip" style="background:var(--subject-physics)"></div><span class="name">Physics</span></div>
  </div>
</body>
</html>
