<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & glow" subtitle="Shadows on near-black + violet glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 26px 22px; background: var(--bg-base); display: flex; gap: 22px; align-items: center; flex-wrap: wrap; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 96px; height: 60px; background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .n { font: var(--text-caption); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="n">shadow-sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="n">shadow-md</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="n">shadow-lg</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="n">shadow-xl</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--glow-violet-sm)"></div><span class="n">glow-violet-sm</span></div>
  <div class="col"><div class="box" style="box-shadow:var(--glow-violet)"></div><span class="n">glow-violet</span></div>
</body>
</html>
