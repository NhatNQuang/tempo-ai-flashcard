<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-base); display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--grad-cta); border-radius: 3px; }
  .n { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); }
  .v { font: var(--text-caption); color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="col"><div class="box" style="width:4px;height:4px"></div><span class="n">1</span><span class="v">4</span></div>
  <div class="col"><div class="box" style="width:8px;height:8px"></div><span class="n">2</span><span class="v">8</span></div>
  <div class="col"><div class="box" style="width:12px;height:12px"></div><span class="n">3</span><span class="v">12</span></div>
  <div class="col"><div class="box" style="width:16px;height:16px"></div><span class="n">4</span><span class="v">16</span></div>
  <div class="col"><div class="box" style="width:20px;height:20px"></div><span class="n">5</span><span class="v">20</span></div>
  <div class="col"><div class="box" style="width:24px;height:24px"></div><span class="n">6</span><span class="v">24</span></div>
  <div class="col"><div class="box" style="width:32px;height:32px"></div><span class="n">7</span><span class="v">32</span></div>
  <div class="col"><div class="box" style="width:40px;height:40px"></div><span class="n">8</span><span class="v">40</span></div>
  <div class="col"><div class="box" style="width:48px;height:48px"></div><span class="n">9</span><span class="v">48</span></div>
  <div class="col"><div class="box" style="width:64px;height:64px"></div><span class="n">10</span><span class="v">64</span></div>
</body>
</html>
