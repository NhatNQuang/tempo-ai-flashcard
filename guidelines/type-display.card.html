<!-- @dsCard group="Type" viewport="700x170" name="Display · Space Grotesk" subtitle="Headings, wordmark, big numbers" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-base); font-family: var(--font-display); color: var(--text-primary); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-bottom: 12px; }
  .big { font-size: 46px; font-weight: 700; letter-spacing: -0.03em; line-height: 1; }
  .row { display: flex; align-items: baseline; gap: 18px; margin-top: 12px; }
  .row span { color: var(--text-secondary); font-size: 13px; font-family: var(--font-sans); }
</style>
</head>
<body>
  <div class="meta">Space Grotesk · weights 400 / 500 / 700</div>
  <div class="big tempo-gradient-text">Study smarter</div>
  <div class="row">
    <span style="font-weight:400; font-family:var(--font-display); font-size:26px; color:var(--text-primary)">Aa</span>
    <span style="font-weight:500; font-family:var(--font-display); font-size:26px; color:var(--text-primary)">Aa</span>
    <span style="font-weight:700; font-family:var(--font-display); font-size:26px; color:var(--text-primary)">Aa</span>
    <span>128h 45m · 3,842 · 68%</span>
  </div>
</body>
</html>
