<!-- @dsCard group="Brand" viewport="700x150" name="Motion & states" subtitle="Hover lift, press, easing, durations" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-base); display: flex; gap: 30px; align-items: center; }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .lab { font: var(--text-eyebrow); text-transform: uppercase; letter-spacing: var(--ls-wider); color: var(--text-tertiary); }
  .val { font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary); }
  .demo { width: 120px; height: 44px; border-radius: var(--radius-md); background: var(--grad-cta); display: flex; align-items: center; justify-content: center; color: #fff; font: var(--text-label); cursor: pointer; transition: transform var(--dur-base) var(--ease-out), box-shadow var(--dur-base) var(--ease-standard); box-shadow: var(--glow-violet-sm); }
  .demo:hover { transform: translateY(-2px); box-shadow: var(--glow-violet); }
  .demo:active { transform: translateY(1px) scale(0.98); }
</style>
</head>
<body>
  <div class="demo">Hover me</div>
  <div class="col">
    <span class="lab">Durations</span>
    <span class="val">fast 140ms · base 200ms · slow 320ms</span>
  </div>
  <div class="col">
    <span class="lab">Easing</span>
    <span class="val">out · cubic-bezier(.16,1,.3,1)</span>
    <span class="val">spring · cubic-bezier(.34,1.56,.64,1)</span>
  </div>
</body>
</html>
