<!-- @dsCard group="Colors" viewport="700x170" name="Canvas & surfaces" subtitle="Blue-black elevation ladder" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px 22px; background: var(--bg-base); }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 60px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  .name { font: var(--text-caption); color: var(--text-secondary); }
  .hex { font-family: var(--font-mono); font-size: 10.5px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--black)"></div><span class="name">black</span><span class="hex">#04060B</span></div>
    <div class="sw"><div class="chip" style="background:var(--bg-sunken)"></div><span class="name">bg-sunken</span><span class="hex">#070910</span></div>
    <div class="sw"><div class="chip" style="background:var(--bg-base)"></div><span class="name">bg-base</span><span class="hex">#0A0C13</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-1)"></div><span class="name">surface-1 · card</span><span class="hex">#12151E</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><span class="name">surface-2</span><span class="hex">#181C28</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><span class="name">surface-3 · hover</span><span class="hex">#202533</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-4)"></div><span class="name">surface-4</span><span class="hex">#2A3140</span></div>
  </div>
</body>
</html>
